name: 가격 수집

on:
  schedule:
    # 매일 22:10 UTC = 한국 시간 07:10 (GitHub 크론은 UTC 기준)
    - cron: "10 22 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 가격 수집
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
        run: python collector/fetch_prices.py

      - name: 특가 판정
        run: python collector/detect_deals.py | tee data/deals_latest.txt

      - name: 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "collect: $(date -u '+%Y-%m-%d')" || echo "변경 없음"
          git push
