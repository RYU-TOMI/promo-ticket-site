name: 가격 수집

on:
  schedule:
    # 매일 22:10 UTC = 한국 시간 07:10 (GitHub 크론은 UTC 기준)
    - cron: "10 22 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 가격 수집
        env:
          TP_TOKEN: ${{ secrets.TP_TOKEN }}
        run: python collector/fetch_prices.py

      - name: 특가 판정
        run: python collector/detect_deals.py | tee data/deals_latest.txt

      - name: 프로모션 메일 수집
        continue-on-error: true   # 메일 실패가 가격 수집 커밋을 막지 않도록
        env:
          MAIL_ADDRESS: ${{ secrets.MAIL_ADDRESS }}
          MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
        run: python collector/mail_ingest.py

      - name: 메일 LLM 파싱
        continue-on-error: true   # 파싱 실패가 나머지 파이프라인을 막지 않도록
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collector/parse_mail.py

      - name: 웹 피드 생성
        run: python collector/build_site.py

      - name: 데이터·사이트 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git commit -m "collect: $(date -u '+%Y-%m-%d')" || echo "변경 없음"
          git push
